title: bluethestyle
tagline: field notes
description: >-
  Notes, working papers, and long-form thinking on financial AI,
  model risk management, and agentic systems.
url: "https://bluethestyle.github.io"
baseurl: ""

since: 2026
timezone: Asia/Seoul
lang: en

author:
  name: Seonkyu Jeong
  role: Independent researcher
  location: Seoul
  frm: true

social:
  email:  jsk320098@gmail.com
  github: bluethestyle
  orcid:  0009-0005-3291-9112
  zenodo: https://zenodo.org/communities/bluethestyle

# Build
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:slug/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 2..3

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope: { path: "", type: "posts" }
    values:
      layout: post
      lang: en
  - scope: { path: "", type: "pages" }
    values:
      layout: page

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
