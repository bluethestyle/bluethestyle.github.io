<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}" data-mode="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  {% seo title=false %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

  <script>
    (function () {
      try {
        var m = localStorage.getItem("mode");
        if (!m && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) m = "dark";
        if (m) document.documentElement.setAttribute("data-mode", m);
      } catch (_) {}
    })();
  </script>
</head>
<body>
  {% include topbar.html %}
  <div class="bts-frame">
    {% include sidebar.html %}
    <main class="bts-main">
      {{ content }}
    </main>
    {% include right-panel.html %}
  </div>
  {% include footer.html %}
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}" defer></script>
</body>
</html>
